<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PLM{% endblock %}</title>
  <link rel="icon" href="{{ request.url_for('static', path='logo-nav.svg') }}" type="image/svg+xml">
  <link rel="manifest" href="{{ request.url_for('manifest') }}">
  <meta name="theme-color" content="#0f172a">
  <style>
    /* ── Reset + base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Top nav ──────────────────────────────────────────────────────── */
    nav {
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      height: 4rem;
      gap: 1.25rem;
      position: sticky;
      top: 0;
      z-index: 100;
      /* Scroll horizontally when the viewport is too narrow to fit all items.
         scrollbar-width/display:none hides the bar without losing functionality. */
      overflow-x: auto;
      scrollbar-width: none;
    }
    nav::-webkit-scrollbar { display: none; }
    .nav-brand {
      display: flex;
      align-items: center;
      margin-right: 0.5rem;
      flex-shrink: 0;
    }
    .nav-brand img {
      height: 55px;
      width: auto;
    }
    nav a {
      color: #94a3b8;
      font-size: 0.875rem;
      padding: 0.2rem 0;
      border-bottom: 2px solid transparent;
    }
    nav a:hover { color: #f1f5f9; text-decoration: none; }
    nav a.active { color: #f1f5f9; border-bottom-color: #3b82f6; }
    .nav-spacer { flex: 1; }
    .nav-logout {
      background: none;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 0.25rem 0.7rem;
      border-radius: 5px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
    }
    .nav-logout:hover { border-color: #64748b; color: #e2e8f0; }

    /* ── Flash messages ───────────────────────────────────────────────── */
    .flash {
      padding: 0.7rem 1.25rem;
      font-size: 0.875rem;
      border-left: 4px solid;
    }
    .flash.success { background: #f0fdf4; border-color: #16a34a; color: #15803d; }
    .flash.error   { background: #fef2f2; border-color: #dc2626; color: #b91c1c; }
    .flash.info    { background: #eff6ff; border-color: #3b82f6; color: #1d4ed8; }

    /* ── Main container ───────────────────────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem;
    }

    /* ── Typography ───────────────────────────────────────────────────── */
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 1.25rem; color: #0f172a; }
    h2 { font-size: 1.05rem; font-weight: 600; margin: 1.25rem 0 0.6rem; color: #334155; }

    /* ── Forms ────────────────────────────────────────────────────────── */
    .form-row {
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .form-group { display: flex; flex-direction: column; gap: 0.2rem; }
    label { font-size: 0.8rem; color: #64748b; font-weight: 500; }
    input[type=text],
    input[type=password],
    input[type=number],
    textarea,
    select {
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 0.375rem 0.6rem;
      font-size: 0.875rem;
      background: #fff;
      color: #1e293b;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid #3b82f6;
      outline-offset: 1px;
      border-color: transparent;
    }
    textarea { resize: vertical; }

    /* ── Buttons ──────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.375rem 0.85rem;
      border-radius: 6px;
      font-size: 0.875rem;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      text-decoration: none;
    }
    .btn:hover { filter: brightness(0.92); text-decoration: none; }
    .btn-primary   { background: #2563eb; color: #fff; }
    .btn-secondary { background: #e2e8f0; color: #1e293b; border-color: #cbd5e1; }
    .btn-danger    { background: #dc2626; color: #fff; }
    .btn-ghost     { background: transparent; color: #475569; border-color: #e2e8f0; }
    .btn-sm { padding: 0.2rem 0.55rem; font-size: 0.8rem; }

    /* ── Utilities ────────────────────────────────────────────────────── */
    .text-muted { color: #6b7280; font-size: 0.85rem; }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    details > summary {
      cursor: pointer;
      color: #64748b;
      font-size: 0.875rem;
      padding: 0.3rem 0;
      list-style: none;
      user-select: none;
    }
    details > summary::-webkit-details-marker { display: none; }
    details > summary::before { content: "▶ "; font-size: 0.7em; }
    details[open] > summary::before { content: "▼ "; }

    /* ── Card ─────────────────────────────────────────────────────────── */
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 1rem 1.1rem;
    }
    .card + .card { margin-top: 0.75rem; }

    {% block extra_style %}{% endblock %}
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav>
  <a class="nav-brand" href="{{ request.url_for('project_list') }}">
    <img src="{{ request.url_for('static', path='logo-nav.svg') }}" alt="PLM">
  </a>
  <a href="{{ request.url_for('project_list') }}"
     {% if request.url.path == '/' %}class="active"{% endif %}>Projects</a>
  <a href="{{ request.url_for('planning_page') }}"
     {% if request.url.path.startswith('/planning') %}class="active"{% endif %}>Planning</a>
  <a href="{{ request.url_for('inbox_page') }}"
     {% if request.url.path == '/inbox' %}class="active"{% endif %}>Inbox</a>
  <a href="{{ request.url_for('profile_page') }}"
     {% if request.url.path == '/profile' %}class="active"{% endif %}>Profile</a>
  <div class="nav-spacer"></div>
  <form method="post" action="{{ request.url_for('logout') }}">
    <button class="nav-logout" type="submit">Logout</button>
  </form>
</nav>

{% if flash %}
<div class="flash {{ flash.category }}">{{ flash.message }}</div>
{% endif %}

<!-- SSE live-refresh banner: hidden until an MCP write arrives mid-edit -->
<div id="sse-banner" style="
  display: none;
  background: #1e3a5f;
  color: #bfdbfe;
  font-size: 0.8rem;
  padding: 0.4rem 1.25rem;
  cursor: pointer;
" onclick="window.location.reload()">
  Changes detected — click to reload
</div>

<main>
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}

<script>
/* SSE live-refresh — reconnects to GET /events and reloads the page (or shows
   the banner) whenever the server sends a 'reload' message.

   Auto-reload is suppressed while the user has a form field focused so that
   in-progress edits are not lost.  The banner lets them reload when ready. */
(function () {
  if (!window.EventSource) return;  // old browser — degrade gracefully

  var banner = document.getElementById('sse-banner');

  function connect() {
    var es = new EventSource('{{ request.url_for("sse_events") }}');

    // Close the SSE connection as soon as the page starts unloading (navigation
    // or refresh).  Without this the browser may deliver a stale 'reload' event
    // to the departing page, which would call window.location.reload() and abort
    // the navigation — making nav buttons appear broken.  Closing here also
    // suppresses the Firefox console error about an interrupted connection.
    window.addEventListener('beforeunload', function () { es.close(); }, { once: true });

    es.onmessage = function (e) {
      if (e.data !== 'reload') return;

      // Check whether the user is actively typing in a form field
      var active = document.activeElement;
      var editing = active && (
        active.tagName === 'INPUT' ||
        active.tagName === 'TEXTAREA' ||
        active.tagName === 'SELECT'
      );

      if (editing) {
        // Surface the banner so they can reload at a safe moment
        if (banner) banner.style.display = 'block';
      } else {
        window.location.reload();
      }
    };

    es.onerror = function () {
      // Close this connection; browser will not auto-reconnect after onerror
      // on a closed source.  Retry after 5 s so a server restart eventually
      // reconnects without flooding the server with rapid reconnect loops.
      es.close();
      setTimeout(connect, 5000);
    };
  }

  connect();
})();
</script>

<script>
/* Register the PWA service worker so the app is installable. */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('{{ request.url_for("static", path="service-worker.js") }}');
}
</script>

</body>
</html>
